# code-ranker-com/actions :: .github/workflows/report.yml
#
# Reusable workflow, run on the CLIENT's runner. code-ranker v5 analyzes ALL
# languages in a single pass, so this is ONE job (no matrix): one analysis →
# snapshot, from which it
#   - generates an HTML report (a diff vs the default-branch baseline when one
#     exists), together with a rendered comment body (header, View-report
#     button, a <details> per language with its violations + stat-diff,
#     baseline line, AI prompt) — report-<H>.html + comment.md + snap.json are
#     always published as the `code-ranker-report` build artifact;
#   - optionally runs the lint gate `check` (do_check, default false) — when
#     enabled, a non-zero exit reds the job; off by default (advisory only).
#
# The PR comment is posted/updated by the BACKEND (the code-ranker GitHub App):
# it downloads the `code-ranker-report` artifact via a `workflow_run` webhook and
# posts the comment — same-repo and fork PRs handled identically.
#
# Baseline = the default-branch snapshot in the Actions cache (single key);
# default-branch pushes refresh it, every branch/PR reads it, so the stat-diff
# works on any branch. The client grants only `contents: read`
# (+ `security-events: write` when `sarif: true`) and pins this stub to an
# immutable commit SHA.
name: code-ranker

on:
  workflow_call:
    inputs:
      do_report:
        description: >-
          Generate the HTML report and publish report-<H>.html + comment.md +
          snap.json as the `code-ranker-report` build artifact (the backend
          downloads it via a workflow_run webhook and posts the View-report
          link).
        required: false
        type: boolean
        default: true
      do_check:
        description: >-
          Lint gate: fail the job when code-ranker finds violations. Default
          false = advisory/report-only (violations still show in the PR comment
          and code scanning, but never red the job). Set true to opt into
          gating, and mark `code-ranker` a required check to actually block merges.
        required: false
        type: boolean
        default: false
      pr_comment:
        description: >-
          Include the rendered comment.md in the code-ranker-report artifact,
          so the code-ranker GitHub App posts/updates the PR comment after
          picking it up via webhook.
        required: false
        type: boolean
        default: true
      sarif:
        description: >-
          Upload SARIF to code scanning (inline PR alerts). Opt-in: needs code
          scanning enabled AND `security-events: write` added to the caller's
          `permissions:` (not granted by default).
        required: false
        type: boolean
        default: false
      runs_on:
        description: Runner label for the job.
        required: false
        type: string
        default: "ubuntu-22.04"
      install_from_source:
        description: >-
          Build code-ranker from the checked-out repo instead of downloading the
          released binary. For code-ranker's OWN dogfood: it runs the public CI
          scripts against its branch sources. Needs a Rust workspace in the repo.
        required: false
        type: boolean
        default: false

env:
  # v5.0.0 is the latest stable release, so track `releases/latest` (future v5.x
  # patches apply automatically).
  CR_INSTALLER: "https://github.com/code-ranker-com/code-ranker/releases/latest/download/code-ranker-installer.sh"

concurrency:
  group: code-ranker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-ranker:
    runs-on: ${{ inputs.runs_on }}
    # Advisory steps (render-diff/artifact-upload/comment) opt out per-step;
    # only the check gate (and a broken analysis) fail the job. Permissions come
    # from the CALLER stub: `contents: read` by default; `security-events: write`
    # only when the caller opts into `sarif: true`.
    steps:
      - uses: actions/checkout@v6

      # Default: install the prebuilt binary (seconds, no toolchain).
      - name: Install code-ranker (prebuilt binary)
        if: ${{ !inputs.install_from_source }}
        run: |
          curl -fsSL "$CR_INSTALLER" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Dogfood path: build code-ranker from the checked-out branch sources.
      - name: Rust toolchain (source build)
        if: inputs.install_from_source
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache (source build)
        if: inputs.install_from_source
        uses: Swatinem/rust-cache@v2
      - name: Build code-ranker from source
        if: inputs.install_from_source
        run: |
          cargo build --release -p code-ranker --locked
          echo "$PWD/target/release" >> "$GITHUB_PATH"

      # Rust (if present): the Rust plugin reads the graph via `cargo metadata
      # --offline`, which needs cargo's local cache warm. No-op for repos without
      # a Cargo.toml.
      - name: Warm Cargo cache (Rust projects)
        if: hashFiles('Cargo.toml') != ''
        run: cargo fetch --manifest-path Cargo.toml

      # Analyze ALL languages once (v5 auto-detect; no --plugins) -> snapshot + HTML.
      - name: Analyze -> snapshot + HTML
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          H="$(git rev-parse --short=12 HEAD)"; echo "H=$H" >> "$GITHUB_ENV"
          BR="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          code-ranker report . \
            --git.branch="$BR" --git.commit="${PR_HEAD_SHA:-$GITHUB_SHA}" \
            --git.dirty-files=0 --git.origin="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --output.json.path="snap.json" --output.html.path="report-${H}.html" \
            --output.sarif.path="report-${H}.sarif"
          echo "REPORT_FILE=report-${H}.html" >> "$GITHUB_ENV"
          echo "REPORT_KIND=report" >> "$GITHUB_ENV"

      # Opt-in (sarif: false by default) — needs the caller's `security-events:
      # write` permission, which is NOT granted unless they explicitly ask for
      # it. Inline alerts in the PR diff + Security → Code scanning. Same-repo
      # only (fork PRs get a read-only token); advisory — a miss never fails
      # the job.
      - name: Upload SARIF to code scanning
        if: >-
          always() && inputs.sarif && hashFiles(format('report-{0}.sarif', env.H)) != '' &&
          (github.event_name == 'push'
           || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report-${{ env.H }}.sarif

      # Default-branch baseline snapshot (single key; cache scope lets any branch/PR
      # read the default-branch cache). Empty on the first run -> diff "no baseline".
      - name: Restore baseline snapshot
        uses: actions/cache/restore@v6
        with:
          path: baseline
          key: ck-baseline-${{ github.sha }}
          restore-keys: |
            ck-baseline-

      # Incompatible snapshot schema major -> drop the baseline so the diff falls
      # back to "no baseline" instead of producing misleading numbers.
      - name: Check baseline version compatibility
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            CUR=$(jq -r '.schema_version // "0"' snap.json | cut -d. -f1)
            BAS=$(jq -r '.schema_version // "0"' baseline/snap.json | cut -d. -f1)
            if [ "$CUR" != "$BAS" ]; then
              echo "::notice::baseline schema v$BAS != current v$CUR — diff skipped until default-branch baseline refreshes"
              rm -rf baseline
            fi
          fi

      # Diff HTML report from the two snapshots (no re-analysis; --baseline emits a
      # *-diff.html). The button then offers the diff.
      - name: Render diff report
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            code-ranker report snap.json --baseline baseline/snap.json \
              --output.html.path="report-${H}.html" >/dev/null 2>&1 || true
            if [ -f "report-${H}-diff.html" ]; then
              echo "REPORT_FILE=report-${H}-diff.html" >> "$GITHUB_ENV"
              echo "REPORT_KIND=diff report" >> "$GITHUB_ENV"
            fi
          fi

      # Violations across all languages from the SAME snapshot (each carries a
      # .language field). With a baseline, `check --baseline` returns
      # {verdict, violations} where violations are only the NEW ones vs the
      # baseline (regressions) — that drives the verdict line in the comment.
      # Without a baseline, it's a plain array of the current violations (review).
      # --exit-zero so this advisory step never fails.
      - name: Collect violations
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            code-ranker check snap.json --baseline baseline/snap.json --output-format json --exit-zero > viol.json 2>/dev/null || echo '{}' > viol.json
            echo "VERDICT=$(jq -r '.verdict // ""' viol.json 2>/dev/null || echo '')" >> "$GITHUB_ENV"
          else
            code-ranker check snap.json --output-format json --exit-zero > viol.json 2>/dev/null || echo '[]' > viol.json
          fi

      # Helper scripts at the EXACT version of this reusable workflow. Needed
      # BEFORE the artifact upload below: comment.md is built here and then
      # published inside the code-ranker-report artifact (this workflow never
      # calls /upload). Built whenever it will actually be consumed: by the
      # backend for pull_request (if pr_comment), or by the job summary for push.
      - name: Get code-ranker-ci scripts
        if: >-
          (github.event_name == 'pull_request' && inputs.pr_comment)
          || github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: code-ranker-com/actions
          ref: ${{ github.job_workflow_sha }}
          path: .ck-ci

      # Renders comment.md with a LITERAL {{CR_REPORT_URL}} placeholder in place
      # of the report link -- this workflow never uploads anything synchronously,
      # so the real URL is never known here. The backend substitutes the real
      # URL when it posts the PR comment (after downloading the artifact via
      # webhook); the Job summary step below just swaps in a static placeholder
      # string for the push case, since there's no PR to comment on.
      - name: Build comment
        if: >-
          (github.event_name == 'pull_request' && inputs.pr_comment)
          || github.event_name == 'push'
        continue-on-error: true
        env:
          URL: "{{CR_REPORT_URL}}"
          # Advisory (do_check=false) → neutral "findings"; gate (true) → "error ❌".
          DO_CHECK: ${{ inputs.do_check }}
        run: bash .ck-ci/scripts/build-comment.sh

      # Publish report + comment + snapshot as the `code-ranker-report` artifact
      # for any event; the backend picks it up via a `workflow_run` webhook and
      # posts the PR comment through the App. Member names (report-<H>.html,
      # comment.md, snap.json, viol.json) are what the backend expects; some may
      # be absent — if-no-files-found: warn tolerates it.
      - name: Upload code-ranker-report artifact
        if: inputs.do_report && hashFiles(env.REPORT_FILE) != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: code-ranker-report
          path: |
            ${{ env.REPORT_FILE }}
            comment.md
            snap.json
            viol.json
          if-no-files-found: warn
          retention-days: 1

      # Push: surface the same body in the job summary (no PR to comment on).
      # The {{CR_REPORT_URL}} placeholder is swapped for a static note here; the
      # backend fills the real URL when it posts the PR comment from the artifact.
      - name: Job summary
        if: github.event_name == 'push' && hashFiles('comment.md') != ''
        run: |
          sed "s|{{CR_REPORT_URL}}|(report will appear via the code-ranker app)|g" comment.md >> "$GITHUB_STEP_SUMMARY"

      # Default-branch pushes refresh the baseline for every other branch.
      - name: Stage new baseline (default branch)
        if: github.ref_name == github.event.repository.default_branch && github.event_name == 'push'
        run: mkdir -p baseline && cp snap.json baseline/snap.json
      - name: Save baseline snapshot (default branch)
        if: github.ref_name == github.event.repository.default_branch && github.event_name == 'push'
        uses: actions/cache/save@v6
        with:
          path: baseline
          key: ck-baseline-${{ github.sha }}

      # Lint gate: reds the job on violations (so it can be a required status
      # check). With a baseline it gates on REGRESSIONS only (relative ratchet:
      # new violations vs the default branch); without one, on all current
      # violations. Reads the SAME snapshot. Runs LAST so the report/upload/
      # summary steps above already ran regardless of the gate's outcome.
      - name: Check (lint gate)
        if: inputs.do_check
        run: |
          if [ -f baseline/snap.json ]; then
            code-ranker check snap.json --baseline baseline/snap.json --output-format github
          else
            code-ranker check snap.json --output-format github
          fi
